name: GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [reference-sheet-updated]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC — refresh analytics
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Fetch reference sheets
        run: npm run fetch-data

      - name: Generate DD documentation
        run: npm run generate
        env:
          TOKEN_URI: ${{ secrets.TOKEN_URI }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          RESO_AGGS_URL: ${{ secrets.RESO_AGGS_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Build search index with Pagefind
        run: |
          cp -r ./_site ./_site_searchable
          mkdir -p ./_site_searchable/dd
          cp -r dd-output/* ./_site_searchable/dd/
          npx pagefind --site ./_site_searchable

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site_searchable

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
